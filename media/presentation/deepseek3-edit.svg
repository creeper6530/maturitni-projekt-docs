<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#495057" />
    </marker>
  </defs>

  <style>
    .box-top { fill: #e3f2fd; stroke: #495057; stroke-width: 2px; rx: 6px; ry: 6px; }
    .box-middle { fill: #f3e5f5; stroke: #495057; stroke-width: 2px; rx: 6px; ry: 6px; }
    .box-bottom { fill: #e8f5e9; stroke: #495057; stroke-width: 2px; rx: 6px; ry: 6px; }
    .text { font-family: 'Arial', sans-serif; font-size: 15px; font-weight: bold; fill: #212529; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #495057; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
  </style>

  <!-- ARROWS (Z-shaped with rounded corners, touching target boxes) -->
  
  <!-- Top to Middle -->
  <path class="arrow" d="M 150 105 L 150 165 Q 150 175 160 175 L 390 175 Q 400 175 400 185 L 400 225" />
  <path class="arrow" d="M 400 105 L 400 225" />
  <path class="arrow" d="M 650 105 L 650 165 Q 650 175 640 175 L 410 175 Q 400 175 400 185 L 400 225" />

  <!-- Middle to Bottom -->
  <path class="arrow" d="M 400 275 L 400 335 Q 400 345 390 345 L 160 345 Q 150 345 150 355 L 150 395" />
  <path class="arrow" d="M 400 275 L 400 395" />
  <path class="arrow" d="M 400 275 L 400 335 Q 400 345 410 345 L 640 345 Q 650 345 650 355 L 650 395" />

  <!-- BOXES & TEXT -->
  
  <!-- Top Layer -->
  <rect class="box-top" x="70" y="55" width="160" height="50" />
  <text class="text" x="150" y="80">ssd1306</text>

  <rect class="box-top" x="320" y="55" width="160" height="50" />
  <text class="text" x="400" y="80">hd44780-driver</text>

  <rect class="box-top" x="570" y="55" width="160" height="50" />
  <text class="text" x="650" y="80">dht20-rs</text>

  <!-- Middle Layer -->
  <rect class="box-middle" x="320" y="225" width="160" height="50" />
  <text class="text" x="400" y="250">embedded-hal</text>

  <!-- Bottom Layer -->
  <rect class="box-bottom" x="70" y="395" width="160" height="50" />
  <text class="text" x="150" y="420">rp2040-hal</text>

  <rect class="box-bottom" x="320" y="395" width="160" height="50" />
  <text class="text" x="400" y="420">stm32f3xx-hal</text>

  <rect class="box-bottom" x="570" y="395" width="160" height="50" />
  <text class="text" x="650" y="420">nrf52840-hal</text>

</svg>